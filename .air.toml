# Air configuration for live-reload
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/memorizr-worker ./cmd/worker/main.go"
  bin = "./tmp/memorizr-worker"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "docker", "scripts"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "sql"]
  kill_delay = "2s"
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
